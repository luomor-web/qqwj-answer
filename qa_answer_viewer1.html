<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问答数据查看器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE6;
    --border: rgba(60,50,30,0.12);
    --border-strong: rgba(60,50,30,0.22);
    --text-primary: #1A1612;
    --text-secondary: #6B6259;
    --text-tertiary: #A89D93;
    --accent: #C4622D;
    --accent-light: #F5E8DF;
    --accent-dark: #8F3F16;
    --blue: #2A5FA5;
    --blue-light: #E6EEF8;
    --green: #2D7A4F;
    --green-light: #E4F2EB;
    --amber: #A0620A;
    --amber-light: #FBF0DC;
    --radius: 10px;
    --radius-lg: 16px;
    --shadow: 0 1px 3px rgba(30,20,10,0.08), 0 4px 16px rgba(30,20,10,0.04);
    --shadow-lg: 0 2px 8px rgba(30,20,10,0.10), 0 12px 40px rgba(30,20,10,0.08);
  }

  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'DM Sans', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Top bar */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(247,245,240,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
  }
  .topbar-inner {
    max-width: 820px;
    margin: 0 auto;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .brand-icon {
    width: 30px;
    height: 30px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .brand-icon svg { width: 16px; height: 16px; }
  .brand-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: 0.02em;
  }
  .search-form {
    display: flex;
    gap: 6px;
    flex: 1;
    max-width: 540px;
  }
  .search-input {
    flex: 1;
    height: 34px;
    padding: 0 12px;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-input::placeholder { color: var(--text-tertiary); font-family: 'DM Sans', sans-serif; }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(196,98,45,0.12); }
  .search-btn {
    height: 34px;
    padding: 0 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .search-btn:hover { background: var(--accent-dark); }
  .search-btn:active { transform: scale(0.97); }

  /* Main layout */
  .main {
    max-width: 820px;
    margin: 0 auto;
    padding: 2.5rem 2rem 4rem;
  }

  /* Hero / empty state */
  .hero {
    text-align: center;
    padding: 5rem 1rem;
    animation: fadeUp 0.5s ease both;
  }
  .hero-icon {
    width: 64px;
    height: 64px;
    background: var(--accent-light);
    border-radius: 20px;
    margin: 0 auto 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hero-icon svg { width: 28px; height: 28px; color: var(--accent); }
  .hero h2 { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 500; color: var(--text-primary); margin-bottom: 8px; }
  .hero p { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }
  .hero code { font-family: 'DM Mono', monospace; background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: 12px; color: var(--accent); }

  /* Loading */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 5rem 1rem;
    animation: fadeUp 0.3s ease both;
  }
  .spinner {
    width: 36px;
    height: 36px;
    border: 2.5px solid var(--border-strong);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-state p { font-size: 14px; color: var(--text-secondary); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-state {
    background: #FFF5F5;
    border: 1px solid rgba(163,45,45,0.2);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    animation: fadeUp 0.3s ease both;
  }
  .error-state svg { flex-shrink: 0; margin-top: 1px; color: #A32D2D; }
  .error-state p { font-size: 13px; color: #7A1F1F; line-height: 1.6; }

  /* Result */
  .result { animation: fadeUp 0.45s ease both; }

  /* User card */
  .user-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 1rem;
    box-shadow: var(--shadow);
  }
  .avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--accent-dark);
    flex-shrink: 0;
    border: 2px solid rgba(196,98,45,0.15);
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 15px; font-weight: 500; color: var(--text-primary); margin-bottom: 3px; }
  .user-meta { font-size: 12px; color: var(--text-tertiary); display: flex; flex-wrap: wrap; gap: 8px; }
  .user-meta span { display: flex; align-items: center; gap: 4px; }
  .ua-badge {
    font-size: 11px;
    background: var(--surface2);
    color: var(--text-secondary);
    padding: 2px 8px;
    border-radius: 99px;
    font-family: 'DM Mono', monospace;
    max-width: 240px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Meta grid */
  .meta-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 1rem;
  }
  .meta-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    box-shadow: var(--shadow);
  }
  .meta-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 4px;
  }
  .meta-value {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    font-family: 'DM Mono', monospace;
    word-break: break-all;
  }

  /* Section */
  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 1.5rem 0 10px;
  }
  .section-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
  }
  .section-line { flex: 1; height: 1px; background: var(--border); }

  /* Answer block */
  .answer-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s;
  }
  .answer-block:hover { box-shadow: var(--shadow-lg); }

  .block-header {
    padding: 10px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .block-id {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-secondary);
  }
  .block-count {
    font-size: 11px;
    color: var(--text-tertiary);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 99px;
    border: 1px solid var(--border);
  }

  /* Question row */
  .question-row {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .question-row:last-child { border-bottom: none; }

  .q-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .q-id-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-tertiary);
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 4px;
  }
  .q-type-badge {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 99px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge-radio { background: var(--blue-light); color: var(--blue); }
  .badge-text { background: var(--green-light); color: var(--green); }
  .badge-checkbox { background: var(--amber-light); color: var(--amber); }
  .badge-default { background: var(--surface2); color: var(--text-secondary); }

  .q-title { font-size: 13px; color: var(--text-secondary); margin-bottom: 2px; }
  .q-desc { font-size: 12px; color: var(--text-tertiary); margin-bottom: 8px; font-style: italic; }

  /* Options */
  .options-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .option-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-secondary);
    transition: background 0.15s;
  }
  .option-item.checked {
    background: var(--accent-light);
    color: var(--accent-dark);
    font-weight: 500;
  }
  .radio-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .option-item.checked .radio-dot {
    border-color: var(--accent);
    background: var(--accent);
  }
  .radio-inner {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #fff;
    display: none;
  }
  .option-item.checked .radio-inner { display: block; }

  /* Text answer */
  .text-answer {
    font-size: 14px;
    color: var(--text-primary);
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 10px 14px;
    font-family: 'DM Mono', monospace;
    word-break: break-all;
    line-height: 1.6;
  }

  /* Footer */
  .result-footer {
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-tertiary);
    text-align: center;
  }
  .result-footer code {
    font-family: 'DM Mono', monospace;
    background: var(--surface2);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 11px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .topbar { padding: 0 1rem; }
    .main { padding: 1.5rem 1rem 3rem; }
    .meta-grid { grid-template-columns: repeat(2, 1fr); }
    .search-form { max-width: none; }
    .brand-name { display: none; }
    .user-card { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
      </div>
      <span class="brand-name">问答数据查看器</span>
    </div>
    <div class="search-form">
      <input class="search-input" id="answerIdInput" type="text" placeholder="输入答题记录 ID…" autocomplete="off" spellcheck="false" />
      <button class="search-btn" onclick="fetchAnswer()">查询</button>
    </div>
  </div>
</div>

<main class="main">
  <div id="result-area">
    <div class="hero">
      <div class="hero-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><path d="M11 8v6M8 11h6"/>
        </svg>
      </div>
      <h2>输入 ID 开始查询</h2>
      <p>在顶部输入框填入答题记录 ID 并回车，<br>或通过 URL 参数直接跳转：<code>?id=your-id-here</code></p>
    </div>
  </div>
</main>

<script>
function escHtml(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getBadgeClass(type) {
  return { radio:'badge-radio', text:'badge-text', checkbox:'badge-checkbox' }[type] || 'badge-default';
}

function detectDevice(ua) {
  if (!ua) return '';
  if (/iPhone|iPad|iPod/i.test(ua)) return '📱 iOS';
  if (/Android/i.test(ua)) return '📱 Android';
  if (/Windows/i.test(ua)) return '🖥 Windows';
  if (/Mac/i.test(ua)) return '🖥 macOS';
  return '🌐 浏览器';
}

function renderQuestion(q) {
  let inner = '';
  if (q.title) inner += `<div class="q-title">标题：${escHtml(q.title)}</div>`;
  if (q.description) inner += `<div class="q-desc">${escHtml(q.description)}</div>`;

  if (q.type === 'text' && q.text !== undefined && q.text !== '') {
    inner += `<div class="text-answer">${escHtml(q.text)}</div>`;
  } else if (q.options && q.options.length > 0) {
    inner += '<ul class="options-list">';
    q.options.forEach(opt => {
      const chk = opt.checked == 1;
      inner += `<li class="option-item ${chk ? 'checked' : ''}">
        <span class="radio-dot"><span class="radio-inner"></span></span>
        ${escHtml(opt.text || opt.id)}
      </li>`;
    });
    inner += '</ul>';
  } else if (q.blanks && q.blanks.length > 0) {
    q.blanks.forEach(b => { inner += `<div class="text-answer">${escHtml(b)}</div>`; });
  }

  return `<div class="question-row">
    <div class="q-header">
      <span class="q-id-tag">${escHtml(q.id)}</span>
      <span class="q-type-badge ${getBadgeClass(q.type)}">${escHtml(q.type)}</span>
    </div>
    ${inner}
  </div>`;
}

function renderResult(payload) {
  const answers = payload.answer || [];
  const user = payload.third_party_user || {};
  const name = user.nickname || user.openid || '匿名用户';
  const initials = name.slice(0, 2);
  const device = detectDevice(payload.ua);

  let html = `<div class="user-card">
    <div class="avatar">${escHtml(initials)}</div>
    <div class="user-info">
      <div class="user-name">${escHtml(name)}</div>
      <div class="user-meta">
        <span>📍 ${escHtml(payload.city || payload.province || '未知地区')}</span>
        <span>🕐 用时 ${payload.duration || 0}s</span>
        <span>🌐 ${escHtml(payload.ip || '')}</span>
        ${device ? `<span class="ua-badge">${device} · ${escHtml(payload.ua || '')}</span>` : ''}
      </div>
    </div>
  </div>`;

  html += `<div class="meta-grid">
    <div class="meta-cell"><div class="meta-label">问卷 ID</div><div class="meta-value">${escHtml(String(payload.survey_id || '-'))}</div></div>
    <div class="meta-cell"><div class="meta-label">答题 ID</div><div class="meta-value">${escHtml(String(payload.answer_id || '-'))}</div></div>
    <div class="meta-cell"><div class="meta-label">开始时间</div><div class="meta-value">${escHtml(payload.started_at || '-')}</div></div>
    <div class="meta-cell"><div class="meta-label">结束时间</div><div class="meta-value">${escHtml(payload.ended_at || '-')}</div></div>
  </div>`;

  if (answers.length === 0) {
    html += '<div class="hero" style="padding:3rem 1rem"><p>该记录暂无答题内容</p></div>';
  } else {
    html += `<div class="section-header">
      <span class="section-label">答题内容</span>
      <span class="section-line"></span>
      <span class="section-label">${answers.length} 个分块</span>
    </div>`;
    answers.forEach((block, i) => {
      const qs = block.questions || [];
      html += `<div class="answer-block" style="animation-delay:${i * 0.05}s">
        <div class="block-header">
          <span class="block-id">${escHtml(block.id)}</span>
          <span class="block-count">${qs.length} 题</span>
        </div>
        ${qs.map(renderQuestion).join('')}
      </div>`;
    });
  }

  html += `<div class="result-footer">数据来源 ID：<code>${escHtml(document.getElementById('answerIdInput').value.trim())}</code></div>`;
  return html;
}

async function fetchAnswer() {
  const id = document.getElementById('answerIdInput').value.trim();
  const area = document.getElementById('result-area');
  if (!id) {
    area.innerHTML = `<div class="error-state">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <p>请输入答题记录 ID</p>
    </div>`;
    return;
  }

  // Sync URL param
  const url = new URL(window.location.href);
  url.searchParams.set('id', id);
  window.history.replaceState(null, '', url.toString());

  area.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>正在查询 ${escHtml(id.slice(0,8))}…</p></div>`;

  try {
    const resp = await fetch(`https://xlab.ai-space.net/api/activity/getAnwserInfo/${encodeURIComponent(id)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const payload = data?.data?.answerInfoJson;
    if (!payload) throw new Error('返回数据中未找到 answerInfoJson 字段');
    area.innerHTML = `<div class="result">${renderResult(payload)}</div>`;
  } catch (e) {
    area.innerHTML = `<div class="error-state">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <p>请求失败：${escHtml(e.message)}<br>请确认 ID 是否正确，或检查网络与接口 CORS 配置。</p>
    </div>`;
  }
}

document.getElementById('answerIdInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchAnswer();
});

// Auto-load from URL param on page load
(function init() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (id) {
    document.getElementById('answerIdInput').value = id;
    fetchAnswer();
  }
})();
</script>
</body>
</html>
